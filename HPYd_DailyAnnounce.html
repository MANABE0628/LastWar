<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HPYd Daily Announcement</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background: #f3f3f3;
      font-family: Arial, "Hiragino Kaku Gothic ProN", "Yu Gothic", sans-serif;
      color: #222;
    }

    .container {
      max-width: 900px;
      margin: 50px auto 0;
      text-align: center;
    }

    h1 {
      font-size: 46px;
      margin-bottom: 30px;
      font-weight: 700;
    }

    .subtext {
      color: #666;
      font-size: 18px;
      margin-bottom: 35px;
    }

    .copy-btn {
      width: 100%;
      max-width: 900px;
      height: 72px;
      font-size: 28px;
      border: 1px solid #999;
      border-radius: 2px;
      background: #fff;
      cursor: pointer;
      margin-bottom: 25px;
    }

    .copy-btn:hover {
      background: #f8f8f8;
    }

    .status {
      text-align: left;
      font-size: 18px;
      margin: 0 auto 15px;
      max-width: 900px;
      color: #222;
      min-height: 28px;
    }

    textarea {
      width: 100%;
      max-width: 900px;
      height: 420px;
      font-size: 18px;
      line-height: 1.7;
      padding: 18px;
      box-sizing: border-box;
      border: 1px solid #999;
      border-radius: 2px;
      resize: vertical;
      background: #fff;
      white-space: pre-wrap;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>HPYd Daily Announcement</h1>

    <div class="subtext">
      [議事堂戦・戦域戦や隕鉄などの突発イベントは手入力ください]
    </div>

    <button class="copy-btn" onclick="copyText()">この内容をコピー</button>

    <div id="status" class="status">読込中...</div>

    <textarea id="announcement" readonly></textarea>
  </div>

  <script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbxBVaB1gWgApq2i25lVqxuzC7j3GW2AujzAfBN32dwy0tY2JNz-rrOL8FkAjywz1gsF/exec";

    async function loadAnnouncement() {
      const status = document.getElementById("status");
      const textarea = document.getElementById("announcement");

      try {
        status.textContent = "読込中...";

        const response = await fetch(GAS_URL);
        if (!response.ok) {
          throw new Error("HTTPエラー: " + response.status);
        }

        const data = await response.json();

        if (!data.success) {
          throw new Error("データ取得失敗");
        }

        textarea.value = data.text || "";
        status.textContent = "";
      } catch (error) {
        status.textContent = "読込失敗";
        textarea.value = error.message || "データ取得に失敗しました。";
      }
    }

    async function copyText() {
      const textarea = document.getElementById("announcement");
      const status = document.getElementById("status");

      try {
        await navigator.clipboard.writeText(textarea.value);
        status.textContent = "コピーしました";
        setTimeout(() => {
          status.textContent = "";
        }, 1500);
      } catch (error) {
        textarea.select();
        document.execCommand("copy");
        status.textContent = "コピーしました";
        setTimeout(() => {
          status.textContent = "";
        }, 1500);
      }
    }

    window.onload = loadAnnouncement;
  </script>
</body>
</html>
