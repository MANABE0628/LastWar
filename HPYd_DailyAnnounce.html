<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Daily Announcement</title>
<style>
body {
  font-family: sans-serif;
  display: flex;
  justify-content: center;
  margin-top: 40px;
}

.container {
  width: 90%;
  max-width: 600px;
}

textarea {
  width: 100%;
  height: 300px;
  font-size: 14px;
}

button {
  margin-top: 10px;
  padding: 10px;
  width: 100%;
  font-size: 16px;
}
</style>
</head>

<body>

<div class="container">
  <h2>HPYd Daily Announcement</h2>

  <div class="muted">［議事堂戦・戦域戦や隕鉄などの突発イベントは手入力ください］</div>

 <button onclick="copyText()">この内容をコピー</button>
 <span id="status"></span> 


  <textarea id="textArea"></textarea>
</div>

<script>
const url = "https://script.google.com/macros/s/AKfycbyMCSeuN16OGb1kyni26BV9y6Fxj_ZgxOLjV2GIIeeQjDX3fDoqfRHmmhRXlPbh5YGw/exec";



fetch(url)
  .then(res => res.json())
  .then(data => {
    document.getElementById("textArea").value = data.text;
  });

function copyText() {
  const textarea = document.getElementById("textArea");
  textarea.select();
  textarea.setSelectionRange(0, 99999); // スマホ対応

  navigator.clipboard.writeText(textarea.value)
    .then(() => {
      document.getElementById("status").innerText = "コピーしました！";
    })
    .catch(() => {
      document.getElementById("status").innerText = "コピー失敗";
    });
}
</script>

</body>
</html>
